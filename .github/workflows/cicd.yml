name: cicd pipeline
on:
  pull_request:
    branches: [ "dev" ]
    types: [opened, synchronize]
  push:
    branches: ["dev"]

jobs:
  prepare:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Create application.yml in Artifacts
        run: |
          echo "${{ secrets.DEV_YML }}" | base64 --decode > application.yml
        shell: bash
      - name: Upload application.yml
        uses: actions/upload-artifact@v4
        with:
          name: application-yml
          path: application.yml

  ci:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [prepare]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Download application.yml
        uses: actions/download-artifact@v4
        with:
          name: application-yml
          path: ./src/main/resources
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x gradlew
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build with Gradle Wrapper
        run: ./gradlew build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build/libs/*.jar

  cd:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4
    
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: build/libs

      - name: Docker build & push to Docker Hub
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/docker-test .
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-test

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # 애플리케이션 폴더 생성 (이미 존재해도 문제 없음)
            mkdir -p ~/app
            cd ~/app

            # 최신 docker-compose.yml 업로드
            echo "${{ secrets.DOCKER_COMPOSE_YML }}" | base64 --decode > docker-compose.yml

            # 기존 컨테이너 정리 (컨테이너가 있을 때만 실행)
            if [ "$(sudo docker ps -q)" ]; then
              sudo docker-compose down
            fi

            # 최신 이미지 다운로드 및 실행
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/docker-test:latest
            sudo docker-compose up -d
            sudo docker image prune -a -f

          
  current-time:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Get Current Time
        uses: 1466587594/get-current-time@v2
        id: current-time
        with:
          format: YYYY-MM-DDTHH:mm:ss
          utcOffset: "+09:00"

      - name: Print Current Time
        run: echo "Current Time=${{steps.current-time.outputs.formattedTime}}"
        shell: bash

  action-slack:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
        - name: Slack Alarm
          uses: 8398a7/action-slack@v3
          with:
              status: ${{ job.status }}
              author_name: GitHub-Actions CI/CD
              fields: repo,message,commit,author,ref,job,took
          env:
              SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          if: always()
