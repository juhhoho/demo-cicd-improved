name: CI/CD Pipeline

on:
  pull_request:
    branches: [ "dev" ]
    types: [opened, synchronize]
  push:
    branches: [ "dev" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: test  # GitHub Environment 선택
    steps:
      - uses: actions/checkout@v4

      - name: Restore application.yml (CI)
        run: |
          echo "${{ secrets.YML }}" | base64 --decode > src/main/resources/application-test.yml

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Redis Container (for CI)
        run: docker run -d -p 6379:6379 --name redis-test redis

      - name: Build & Test with Gradle (CI)
        run: ./gradlew build --stacktrace

      - name: Check if JAR file exists
        run: ls -al build/libs/

      - name: Upload build artifacts (JAR + application-test.yml)
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            build/libs/*.jar
            src/main/resources/application-test.yml

  cd:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [ci]
    environment: prod  # GitHub Environment 선택
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts (JAR + application-test.yml)
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ./deploy/

      - name: Rename application.yml for Production
        run: mv ./deploy/application-test.yml ./deploy/application-prod.yml

      - name: Docker build & push to Docker Hub
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/docker-test .
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-test

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/docker-test:latest
            sudo docker stop $(sudo docker ps -q)
            sudo docker run -d --log-driver=syslog -p 8080:8080 \
              -v /home/ec2-user/application-prod.yml:/app/application.yml \
              -e SPRING_PROFILES_ACTIVE=prod \
              ${{ secrets.DOCKER_USERNAME }}/docker-test:latest

