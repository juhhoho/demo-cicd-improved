name: CI/CD using GitHub Actions & Docker

on:
  pull_request:
    branches: [ "dev" ]
    types: [opened, synchronize]
  pull_request_target:
    branches: [ "dev" ]
    types: [opened, synchronize, closed]

jobs:
  prepare:
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Create application.yml in Artifacts
        run: |
          echo "${{ secrets.YML }}" | base64 --decode > application.yml
        shell: bash
      - name: Upload application.yml
        uses: actions/upload-artifact@v4
        with:
          name: application-yml
          path: application.yml

  ci:
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - name: Download application.yml
        uses: actions/download-artifact@v4
        with:
          name: application-yml
          path: ./src/main/resources

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@417ae3ccd767c252f5661f1ace9f835f9654f2b5 # v3.1.0

      - name: Build with Gradle Wrapper
        run: ./gradlew build

  cd:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Docker build & push to Docker Hub
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/docker-test .
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-test

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/docker-test:latest
            sudo docker stop $(sudo docker ps -q)  # 실행 중인 컨테이너만 중지
            sudo docker run -d --log-driver=syslog -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/docker-test:latest
            sudo docker rm $(sudo docker ps --filter 'status=exited' -q)  # 종료된 컨테이너만 삭제
            sudo docker image prune -a -f
