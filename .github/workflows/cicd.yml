name: cicd pipeline
on:
  pull_request:
    branches: [ "dev" ]
    types: [opened, synchronize]
  push:
    branches: ["dev"]

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Create application.yml from LOCAL_YML
        run: |
          echo "${{ secrets.LOCAL_YML }}" | base64 --decode > application.yml
        shell: bash
      - name: Upload application.yml (LOCAL_YML)
        uses: actions/upload-artifact@v4
        with:
          name: application-yml
          path: application.yml

  ci:
    runs-on: ubuntu-latest
    needs: [prepare]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # 1️⃣ LOCAL_YML을 application.yml로 생성
      - name: Download application.yml (LOCAL_YML)
        uses: actions/download-artifact@v4
        with:
          name: application-yml
          path: ./src/main/resources

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 2️⃣ LOCAL_YML을 사용하여 빌드 및 테스트
      - name: Build and test with Gradle
        run: ./gradlew build

      # 3️⃣ 빌드 성공하면 application.yml을 DEV_YML로 변경
      - name: Replace application.yml with DEV_YML
        run: echo "${{ secrets.DEV_YML }}" | base64 --decode > ./src/main/resources/application.yml

      # 4️⃣ 최종 빌드 아티팩트 업로드
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build/libs/*.jar


  cd:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: build/libs

      - name: Docker build & push to Docker Hub
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/docker-test .
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-test

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app
            echo "${{ secrets.DOCKER_COMPOSE_YML }}" | base64 --decode > docker-compose.yml

            if [ "$(sudo docker ps -q)" ]; then
              sudo docker-compose down
            fi
            # 최신 이미지 pull
            sudo docker-compose pull
            sudo docker-compose up -d
            sudo docker ps -a
            sudo docker image prune -a -f

  pr-slack:
    if: github.event_name == 'pull_request'
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Slack Notification for PR CI
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          author_name: GitHub-Actions CI
          fields: repo,message,commit,author,ref,job,took
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()

  push-slack:
    if: github.event_name == 'push'
    needs: [cd]
    runs-on: ubuntu-latest
    steps:
      - name: Slack Notification for Push CI/CD
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          author_name: GitHub-Actions CI/CD
          fields: repo,message,commit,author,ref,job,took
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()

